###############################################################################
# domains.conf - Domain to Relay SMTP Mapping
#
# This file defines which domains the gateway will accept mail for and
# where to relay it after spam filtering.
#
# FORMAT:
#   domain          relay_server          port
#
# - domain:        The recipient domain to accept and relay mail for
# - relay_server:  IP address or hostname of the destination SMTP server
# - port:          Destination SMTP port (default: 25 if omitted)
#
# Lines starting with # are comments. Blank lines are ignored.
#
# After editing this file, regenerate the Postfix transport maps:
#   sudo /opt/mail-gateway/update-domains.sh
# Or manually:
#   sudo postmap hash:/etc/postfix/transport
#   sudo postmap hash:/etc/postfix/relay_domains
#   sudo postfix reload
###############################################################################

# ejemplo.com         192.168.1.10          25
# miempresa.org       mail.backend.local    25
# otrodominio.net     10.0.0.50             587
